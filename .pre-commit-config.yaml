# Pre-commit hooks for mp2-clinical-injection
# Runs on `git commit`; blocks commit if any check fails

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # If a NEW secret pattern appears that's not in baseline → commit blocked
        # To audit and update: `detect-secrets audit .secrets.baseline`
